
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Link + Custom Cursor</title>
  <style>
    @font-face {
      font-family: 'Salmanazar';
      src: url('205TF-Salmanazar-light.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    /* Page */
    html, body { height: 100%; }
    body{
      margin: 0;
      background: #fff;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* The single linked image */
    .hero-link{
      display: inline-block;
      line-height: 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .hero-link img{
      display: block;
      max-width: min(1000px, 92vw);
      height: auto;
    }

    /* Hide the system cursor on desktop mouse devices */
    @media (hover: hover) and (pointer: fine) {
      body { cursor: none; }
      a, button { cursor: none; }
    }

    /* Cursor container */
    .cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 99999;
      display: none; /* completely hidden until mouse moves */
    }
    .cursor.is-visible {
      display: block;
    }

    /* 20px black dot (+3px) */
    .cursor-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transform: translate(-50%, -50%);
      opacity: 1;
      transition: opacity 140ms ease;
    }

    /* Ring with lashes container - normal state: 20px (+3px) */
    .cursor-ring {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,0.35);
      background: rgba(255, 255, 255, 0.6);
      transform: translate(-50%, -50%);
      opacity: 1;
      transition: width 140ms ease, height 140ms ease;
    }

    /* 5 lashes on the ring (hidden by default) */
    .cursor-lash {
      position: absolute;
      width: 1.4px;
      height: 8px;
      background: rgba(0,0,0,0.35);
      left: 50%;
      top: -8px; /* outside the ring */
      transform-origin: center calc(8px + 17px); /* lash height + center of larger ring (34px / 2) */
      opacity: 0;
      transition: opacity 140ms ease;
    }

    .cursor-lash:nth-child(1) { transform: translateX(-50%) rotate(-60deg); }
    .cursor-lash:nth-child(2) { transform: translateX(-50%) rotate(-40deg); }
    .cursor-lash:nth-child(3) { transform: translateX(-50%) rotate(-20deg); }
    .cursor-lash:nth-child(4) { transform: translateX(-50%) rotate(0deg); }
    .cursor-lash:nth-child(5) { transform: translateX(-50%) rotate(20deg); }
    .cursor-lash:nth-child(6) { transform: translateX(-50%) rotate(40deg); }
    .cursor-lash:nth-child(7) { transform: translateX(-50%) rotate(60deg); }

    /* Hover state: ring grows to 34px (+3px) and show lashes */
    .cursor.is-eye .cursor-ring {
      width: 34px;
      height: 34px;
    }
    .cursor.is-eye .cursor-lash { opacity: 1; }

    /* Blink animation */
    @keyframes blink {
      0%, 100% { transform: translate(-50%, -50%) scaleY(1); }
      50% { transform: translate(-50%, -50%) scaleY(0.1); }
    }
    .cursor.is-blinking .cursor-ring {
      animation: blink 150ms ease-in-out;
    }
    .cursor.is-blinking .cursor-dot {
      animation: blink 150ms ease-in-out;
    }

    /* Look around animation */
    @keyframes look-left {
      0%, 100% { transform: translate(-50%, -50%); }
      30%, 70% { transform: translate(calc(-50% - 5px), -50%); }
    }
    @keyframes look-right {
      0%, 100% { transform: translate(-50%, -50%); }
      30%, 70% { transform: translate(calc(-50% + 5px), -50%); }
    }
    .cursor.is-looking-left .cursor-dot {
      animation: look-left 400ms ease-in-out;
    }
    .cursor.is-looking-right .cursor-dot {
      animation: look-right 400ms ease-in-out;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .cursor-eye, .cursor-dot, .cursor-ring { transition: none; }
    }

    /* Rotating news button */
    .news-button {
      position: fixed;
      top: 100px;
      left: 100px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7b3ba8, #4a1570 60%, #1f0830);
      box-shadow: 
        0 0 12px rgba(138, 43, 226, 0.3),
        inset 0 0 8px rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin-clockwise 8s linear infinite;
      cursor: pointer;
      text-decoration: none;
      z-index: 1000;
    }

    .news-button:hover {
      box-shadow: 
        0 0 18px rgba(138, 43, 226, 0.4),
        inset 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .news-button-text {
      color: #fff;
      font-family: 'Salmanazar', sans-serif;
      font-size: 24px;
      font-weight: normal;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    @keyframes spin-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Rotating news button -->
  <a class="news-button" href="https://www.a3g.ch" target="_blank" rel="noreferrer">
    <span class="news-button-text">get<br>news!</span>
  </a>

  <!-- One picture as a link -->
  <a class="hero-link" href="https://www.a3g.ch" target="_blank" rel="noreferrer" aria-label="Open link">
    <img src="Test12.png" alt="Linked image" />
  </a>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor" aria-hidden="true">
    <div class="cursor-ring">
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
      <div class="cursor-lash"></div>
    </div>
    <div class="cursor-dot"></div>
  </div>

  <script>
    (() => {
      const finePointer = matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (!finePointer) return;

      const cursor = document.getElementById("cursor");
      const dot = cursor.querySelector(".cursor-dot");
      const ring = cursor.querySelector(".cursor-ring");

      let mx = -100, my = -100; // start off-screen
      let rx = mx, ry = my; // ring lag position
      let isHovering = false;
      
      // Set initial position off-screen
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
      ring.style.left = rx + "px";
      ring.style.top = ry + "px";

      window.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;

        // Show cursor on first move
        if (!cursor.classList.contains("is-visible")) {
          cursor.classList.add("is-visible");
        }

        // dot follows immediately
        dot.style.left = mx + "px";
        dot.style.top  = my + "px";
        
        // When hovering, ring also follows immediately (no lag)
        if (isHovering) {
          rx = mx;
          ry = my;
          ring.style.left = mx + "px";
          ring.style.top  = my + "px";
        }
      }, { passive: true });

      function loop() {
        // ring easing / lag only when NOT hovering
        if (!isHovering) {
          const ease = 0.14; // smaller => more lag
          rx += (mx - rx) * ease;
          ry += (my - ry) * ease;

          ring.style.left = rx + "px";
          ring.style.top  = ry + "px";
        }

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      // Turn into eye when hovering the image link
      const linkEl = document.querySelector(".hero-link");
      let blinkInterval = null;
      let lookInterval = null;

      function doBlink() {
        cursor.classList.add("is-blinking");
        setTimeout(() => cursor.classList.remove("is-blinking"), 150);
      }

      function doLook() {
        // Random direction: left or right
        const direction = Math.random() < 0.5 ? "left" : "right";
        cursor.classList.add("is-looking-" + direction);
        setTimeout(() => cursor.classList.remove("is-looking-" + direction), 400);
      }

      function startBlinking() {
        // Random blink every 2-5 seconds
        function scheduleBlink() {
          const delay = 2000 + Math.random() * 3000; // 2-5 sec
          blinkInterval = setTimeout(() => {
            if (isHovering) {
              doBlink();
              scheduleBlink();
            }
          }, delay);
        }
        scheduleBlink();
      }

      function startLooking() {
        // Random look every 1.5-4 seconds
        function scheduleLook() {
          const delay = 1500 + Math.random() * 2500; // 1.5-4 sec
          lookInterval = setTimeout(() => {
            if (isHovering) {
              doLook();
              scheduleLook();
            }
          }, delay);
        }
        scheduleLook();
      }

      function stopBlinking() {
        if (blinkInterval) {
          clearTimeout(blinkInterval);
          blinkInterval = null;
        }
        cursor.classList.remove("is-blinking");
      }

      function stopLooking() {
        if (lookInterval) {
          clearTimeout(lookInterval);
          lookInterval = null;
        }
        cursor.classList.remove("is-looking-left", "is-looking-right");
      }

      linkEl.addEventListener("mouseenter", () => {
        isHovering = true;
        cursor.classList.add("is-eye");
        // Snap ring to current position immediately
        rx = mx;
        ry = my;
        ring.style.left = mx + "px";
        ring.style.top  = my + "px";
        startBlinking();
        startLooking();
      });
      linkEl.addEventListener("mouseleave", () => {
        isHovering = false;
        cursor.classList.remove("is-eye");
        stopBlinking();
        stopLooking();
      });
    })();
  </script>
</body>
</html>
